<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Programmer portfolio favicon">
  <title>Programmer Portfolio Favicon</title>
  <defs>
    <linearGradient id="bg" x1="96" y1="64" x2="416" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="112" y1="128" x2="400" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- rounded app-icon background -->
  <rect x="40" y="40" width="432" height="432" rx="104" fill="url(#bg)"/>

  <!-- subtle terminal window -->
  <rect x="96" y="124" width="320" height="264" rx="36" fill="#0F172A" stroke="#334155" stroke-width="12"/>
  <circle cx="136" cy="164" r="10" fill="#EF4444"/>
  <circle cx="168" cy="164" r="10" fill="#F59E0B"/>
  <circle cx="200" cy="164" r="10" fill="#22C55E"/>

  <!-- code brackets -->
  <path d="M190 220L140 256L190 292" fill="none" stroke="url(#accent)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M322 220L372 256L322 292" fill="none" stroke="url(#accent)" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- slash -->
  <path d="M282 206L230 306" fill="none" stroke="#E5E7EB" stroke-width="28" stroke-linecap="round"/>

  <!-- portfolio spark/cursor detail -->
  <path d="M148 336H264" stroke="#64748B" stroke-width="18" stroke-linecap="round"/>
  <path d="M298 336H340" stroke="#38BDF8" stroke-width="18" stroke-linecap="round"/>
</svg>
